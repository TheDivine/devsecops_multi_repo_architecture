name: ci-security

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secret scanning - Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SAST - Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/ci

      - name: Filesystem scan - Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH

      - name: IaC scan - Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          output_format: sarif
          output_file_path: checkov.sarif

      - name: Build image
        run: |
          docker build -t ${{ secrets.REGISTRY_HOST }}/${{ vars.IMAGE_NAME }}:${{ github.sha }} .

      - name: Image scan - Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.REGISTRY_HOST }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH

      - name: Generate SBOM
        run: |
          trivy image --format cyclonedx --output sbom.cdx.json ${{ secrets.REGISTRY_HOST }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ secrets.REGISTRY_HOST }} -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
          docker push ${{ secrets.REGISTRY_HOST }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}
