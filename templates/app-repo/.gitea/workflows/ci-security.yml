name: ci-security

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.sha }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME || 'demo-client-app' }}
      REGISTRY_HOST: ${{ secrets.REGISTRY_HOST || 'registry.example.com' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

      - name: Secret scanning - Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SAST - Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/ci

      - name: Filesystem scan - Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: trivy-fs.json
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: IaC scan - Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          output_format: json
          output_file_path: checkov.json

      - name: Build image
        run: |
          docker build -t "${REGISTRY_HOST}/${IMAGE_NAME}:${IMAGE_TAG}" .

      - name: Image scan - Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.REGISTRY_HOST || 'registry.example.com' }}/${{ vars.IMAGE_NAME || 'demo-client-app' }}:${{ github.sha }}
          format: json
          output: trivy-image.json
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Generate SBOM
        run: |
          trivy image --format cyclonedx --output sbom.cdx.json "${REGISTRY_HOST}/${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-reports-${{ github.sha }}
          path: |
            trivy-fs.json
            trivy-image.json
            checkov.json
            sbom.cdx.json

      - name: DefectDojo reimport placeholder
        if: always()
        run: |
          echo "Import reports with scripts/defectdojo/reimport-scan.sh from the platform-devsecops repository."
          echo "Required private CI vars: DEFECTDOJO_URL, DEFECTDOJO_API_KEY, DEFECTDOJO_PRODUCT_NAME, DEFECTDOJO_ENGAGEMENT_NAME."

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ secrets.REGISTRY_HOST }} -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
          docker push "${REGISTRY_HOST}/${IMAGE_NAME}:${IMAGE_TAG}"
