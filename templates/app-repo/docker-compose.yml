services:
  app:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      LOG_LEVEL: debug
    env_file:
      - .env.example
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

# Local development only. Production runtime configuration belongs in the deployment repository.
