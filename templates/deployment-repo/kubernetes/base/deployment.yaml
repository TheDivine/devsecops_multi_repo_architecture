apiVersion: apps/v1
kind: Deployment
metadata:
  name: <application-name>
  namespace: <namespace>
  labels:
    app.kubernetes.io/name: <application-name>
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: <application-name>
  template:
    metadata:
      labels:
        app.kubernetes.io/name: <application-name>
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: app
          image: <registry-url>/<project-name>/<application-name>:<image-tag>
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
