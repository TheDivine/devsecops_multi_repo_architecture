apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cybelynxcore-api
  namespace: cybelynxcore-production
  labels:
    app.kubernetes.io/name: cybelynxcore-api
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cybelynxcore-api
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
