apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: cybelynxcore-require-production-controls
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - cybelynxcore-production
      validate:
        message: "Production pods must run as non-root."
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
    - name: require-resource-requests
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - cybelynxcore-production
      validate:
        message: "Production containers must define resource requests."
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
