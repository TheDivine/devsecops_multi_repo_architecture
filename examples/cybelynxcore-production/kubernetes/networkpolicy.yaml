apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cybelynxcore-api-ingress
  namespace: cybelynxcore-production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cybelynxcore-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
