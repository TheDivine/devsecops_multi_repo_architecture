---
baseline_timezone: UTC
baseline_disable_password_authentication: true
baseline_ssh_permit_root_login: "no"
baseline_manage_firewall: false
baseline_common_packages:
  - ca-certificates
  - curl
  - git
  - auditd
  - unattended-upgrades
  - prometheus-node-exporter
security_audit_rules_path: /etc/audit/rules.d/99-cybelynxcore.rules
observability_node_exporter_enabled: true
